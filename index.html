<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria dos Goats</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🍕 Pizzaria dos Goats</h1>
  <p id="status"></p>
</header>

<section class="cardapio">

  <div class="item">
    <img src="https://images.unsplash.com/photo-1601924582975-7e02b8f3b8e2?auto=format&fit=crop&w=600&q=80">
    <h3>Calabresa</h3>
    <p>R$ 35</p>
    <button onclick="addCarrinho('Calabresa',35)">Adicionar</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=600&q=80">
    <h3>Frango com Catupiry</h3>
    <p>R$ 38</p>
    <button onclick="addCarrinho('Frango com Catupiry',38)">Adicionar</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=600&q=80">
    <h3>Chocolate</h3>
    <p>R$ 40</p>
    <button onclick="addCarrinho('Chocolate',40)">Adicionar</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=600&q=80">
    <h3>Coca-Cola 2L</h3>
    <p>R$ 12</p>
    <button onclick="addCarrinho('Coca-Cola 2L',12)">Adicionar</button>
  </div>

</section>

<section class="carrinho">
  <h2>🛒 Carrinho</h2>
  <div id="lista"></div>

  <p>Taxa de entrega: R$ <span id="taxa">5.00</span></p>
  <h3>Total: R$ <span id="total">0</span></h3>

  <input type="text" id="endereco" placeholder="Digite seu endereço">

  <select id="pagamento">
    <option value="">Forma de pagamento</option>
    <option>Pix</option>
    <option>Cartão</option>
    <option>Dinheiro</option>
  </select>

  <button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
</section>

<script src="script.js"></script>
</body>
</html>
